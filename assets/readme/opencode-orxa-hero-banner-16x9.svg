<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Opencode Orxa Hero Banner</title>
  <desc id="desc">Marketing banner for Opencode Orxa with product name, value proposition, and key capabilities.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070d"/>
      <stop offset="45%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#0f2340"/>
    </linearGradient>
    <linearGradient id="accentA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="accentB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.34"/>
    </linearGradient>
    <filter id="softBlur"><feGaussianBlur stdDeviation="42"/></filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <circle cx="1320" cy="140" r="230" fill="#2dd4bf" fill-opacity="0.22" filter="url(#softBlur)"/>
  <circle cx="210" cy="780" r="260" fill="#3b82f6" fill-opacity="0.2" filter="url(#softBlur)"/>

  <rect x="64" y="64" width="1472" height="772" rx="28" fill="#0b1220" fill-opacity="0.74" stroke="#2a3f5f"/>

  <rect x="128" y="130" width="274" height="44" rx="22" fill="#0f2239" stroke="#345680"/>
  <text x="266" y="159" text-anchor="middle" fill="#b6d2f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="1">DESKTOP CONTROL PLANE</text>

  <text x="128" y="284" fill="#f8fbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="84" font-weight="800">Opencode Orxa</text>
  <rect x="128" y="312" width="510" height="8" rx="4" fill="url(#accentA)"/>

  <text x="128" y="392" fill="#d2e2f4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="500">Run OpenCode workspaces with confidence.</text>
  <text x="128" y="444" fill="#9eb7d4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30">One desktop app for sessions, agents, runtime, terminals, and releases.</text>

  <rect x="128" y="510" width="640" height="248" rx="20" fill="#0f1a2b" stroke="#2a4366"/>
  <text x="168" y="570" fill="#dbe9fa" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Why teams use it</text>

  <circle cx="178" cy="618" r="6" fill="#2dd4bf"/>
  <text x="200" y="626" fill="#b9d0ea" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">Multi-workspace orchestration in one place</text>

  <circle cx="178" cy="664" r="6" fill="#60a5fa"/>
  <text x="200" y="672" fill="#b9d0ea" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">Typed IPC + secure Electron defaults</text>

  <circle cx="178" cy="710" r="6" fill="#2dd4bf"/>
  <text x="200" y="718" fill="#b9d0ea" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">Signed updates and release automation</text>

  <rect x="860" y="190" width="610" height="548" rx="24" fill="url(#accentB)" stroke="#36557c"/>
  <rect x="904" y="242" width="522" height="86" rx="14" fill="#111d30" stroke="#355275"/>
  <text x="944" y="295" fill="#e6f0ff" font-family="IBM Plex Mono, Menlo, monospace" font-size="30" font-weight="700">OPENCODE + ORXA</text>

  <rect x="904" y="360" width="246" height="156" rx="14" fill="#111d30" stroke="#355275"/>
  <text x="930" y="405" fill="#a8bfd9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">Workspaces</text>
  <text x="930" y="468" fill="#f5f9ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">23</text>

  <rect x="1180" y="360" width="246" height="156" rx="14" fill="#111d30" stroke="#355275"/>
  <text x="1206" y="405" fill="#a8bfd9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">Active Agents</text>
  <text x="1206" y="468" fill="#f5f9ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">8</text>

  <rect x="904" y="546" width="522" height="150" rx="14" fill="#111d30" stroke="#355275"/>
  <text x="930" y="592" fill="#a8bfd9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">Tagline</text>
  <text x="930" y="646" fill="#f5f9ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Reliable orchestration for AI coding teams.</text>
</svg>
