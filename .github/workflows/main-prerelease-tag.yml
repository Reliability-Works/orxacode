name: Main Prerelease Tag
run-name: Main prerelease tag for ${{ github.ref_name }}

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

concurrency:
  group: main-prerelease-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-prerelease:
    name: Create prerelease tag
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure ref is main
        if: github.ref_name != 'main'
        run: |
          echo "This workflow only runs for the main branch. Current ref: ${GITHUB_REF_NAME}"
          exit 1

      - name: Read package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "${VERSION}" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected package version: ${VERSION}"

      - name: Skip non-prerelease versions
        if: steps.version.outputs.is_prerelease != 'true'
        run: echo "Version ${{ steps.version.outputs.version }} is not a prerelease. No tag created."

      - name: Check if prerelease tag already exists
        if: steps.version.outputs.is_prerelease == 'true'
        id: tag_check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} does not exist yet."
          fi

      - name: Create and push prerelease tag
        if: steps.version.outputs.is_prerelease == 'true' && steps.tag_check.outputs.exists != 'true'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Prerelease ${TAG} from main"
          git push origin "refs/tags/${TAG}"
          echo "Created and pushed ${TAG}"

      - name: Dispatch release workflow for new tag
        if: steps.version.outputs.is_prerelease == 'true' && steps.tag_check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          gh workflow run release.yml --ref "${TAG}"
          echo "Dispatched release workflow for ${TAG}"

      - name: Tag already present
        if: steps.version.outputs.is_prerelease == 'true' && steps.tag_check.outputs.exists == 'true'
        run: echo "No action needed. prerelease tag v${{ steps.version.outputs.version }} already exists."
