name: CI
run-name: Verify ${{ github.event_name }} on ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify workspace quality gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Duplication
        run: pnpm duplication

      - name: Typecheck
        run: pnpm typecheck

      - name: Performance guards (if configured)
        run: pnpm run --if-present test:perf-guard

      - name: Test with coverage (if configured)
        run: pnpm run --if-present test:coverage

      - name: Test
        run: pnpm test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage
            apps/*/coverage
            packages/*/coverage
          if-no-files-found: ignore
